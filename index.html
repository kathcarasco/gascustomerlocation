<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Gaslink</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #top { background: white; padding: 16px; flex-shrink: 0; border-bottom: 1px solid #eee; }
    #top h1 { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    #top .sub { font-size: 13px; color: #888; margin-bottom: 14px; }
    #confirm-btn { width: 100%; padding: 20px; border-radius: 14px; border: none; background: #ccc; color: white; font-size: 18px; font-weight: 800; cursor: pointer; transition: background 0.3s; }
    #confirm-btn.ready { background: #1D9E75; box-shadow: 0 4px 16px rgba(29,158,117,0.4); }
    #status-text { font-size: 13px; color: #888; text-align: center; margin-top: 10px; min-height: 18px; }
    #map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; z-index: 1; }
    #map-label { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; font-size: 12px; padding: 5px 14px; border-radius: 20px; z-index: 999; white-space: nowrap; pointer-events: none; }
    #spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: white; padding: 14px 20px; border-radius: 12px; font-size: 14px; color: #444; z-index: 999; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
    #spinner.hide { display: none; }
    .spin { width: 18px; height: 18px; border: 2.5px solid #eee; border-top-color: #1D9E75; border-radius: 50%; animation: sp 0.8s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
    #done { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#f5f5f0; align-items:center; justify-content:center; z-index:9999; }
    #done.show { display:flex; }
    .done-card { background:white; border-radius:20px; padding:36px 28px; max-width:340px; width:90%; text-align:center; }
    .done-icon { width:64px; height:64px; background:#E1F5EE; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
    .done-card h2 { font-size:24px; font-weight:800; margin-bottom:10px; color:#1a1a1a; }
    .done-card p { font-size:15px; color:#666; line-height:1.6; }
    .ref-box { background:#f5f5f0; border-radius:12px; padding:14px 16px; margin-top:20px; }
    .ref-label { font-size:12px; color:#999; }
    .ref-val { font-size:18px; font-weight:800; color:#1a1a1a; margin-top:4px; }
  </style>
</head>
<body>

<div id="top">
  <h1>Gaslink Delivery</h1>
  <p class="sub">I-tap ang green button kapag tama na ang pin.</p>
  <button id="confirm-btn" onclick="confirmLocation()">Sandali, hinahanap kayo...</button>
  <p id="status-text">Kinukuha ang inyong GPS location...</p>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <div id="map-label">I-tap ang mapa para ilipat ang pin</div>
  <div id="spinner"><div class="spin"></div>Hinahanap kayo...</div>
</div>

<div id="done">
  <div class="done-card">
    <div class="done-icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>Salamat!</h2>
    <p>Natanggap na ng aming dispatcher ang lokasyon ninyo. Papunta na ang rider.</p>
    <div class="ref-box">
      <div class="ref-label">Reference number</div>
      <div class="ref-val" id="ref-display"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  var DEFAULT_LAT = 14.7469;
  var DEFAULT_LNG = 121.0563;

  var params = new URLSearchParams(window.location.search);
  var NAME     = params.get('name')    || '';
  var CONTACT  = params.get('contact') || '';
  var ORDER    = params.get('order')   || '';
  var REF      = params.get('ref')     || 'GAS-' + new Date().toISOString().slice(0,10);
  var SAVE_URL = params.get('save') || 'https://script.google.com/macros/s/AKfycbyQ-7ixskb67WkT2SURvRcaFFmiJfi1kyd9_2bz6UqtT3QzjINFvWbvq3apf41fQIfgwA/exec';

  document.getElementById('ref-display').textContent = REF;

  var map = L.map('map', {zoomControl:true}).setView([DEFAULT_LAT, DEFAULT_LNG], 17);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);

  var icon = L.divIcon({
    html: '<div style="width:32px;height:32px;background:#1D9E75;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4)"></div>',
    iconSize: [32,32], iconAnchor: [16,32], className: ''
  });

  var marker = L.marker([DEFAULT_LAT, DEFAULT_LNG], {icon:icon, draggable:true}).addTo(map);

  map.on('click', function(e) {
    marker.setLatLng(e.latlng);
    setReady(e.latlng.lat, e.latlng.lng);
  });

  marker.on('dragend', function() {
    var p = marker.getLatLng();
    setReady(p.lat, p.lng);
  });

  function setReady(lat, lng) {
    var btn = document.getElementById('confirm-btn');
    btn.textContent = 'Tama na ang lokasyon ko. Click here!';
    btn.classList.add('ready');
    document.getElementById('status-text').textContent = 'Lat ' + lat.toFixed(4) + '  Lng ' + lng.toFixed(4);
  }

  // Blue dot marker for current location
  var blueDot = L.divIcon({
    html: '<div style="width:18px;height:18px;background:#1a73e8;border-radius:50%;border:3px solid white;box-shadow:0 0 0 4px rgba(26,115,232,0.25)"></div>',
    iconSize: [18,18], iconAnchor: [9,9], className: ''
  });
  var locationMarker = null;

  function startWatching() {
    if (!navigator.geolocation) {
      setReady(DEFAULT_LAT, DEFAULT_LNG);
      document.getElementById('spinner').classList.add('hide');
      return;
    }

    // Watch position — updates in real time as customer moves
    navigator.geolocation.watchPosition(
      function(pos) {
        var lat = pos.coords.latitude;
        var lng = pos.coords.longitude;

        // Move blue dot
        if (locationMarker) {
          locationMarker.setLatLng([lat, lng]);
        } else {
          locationMarker = L.marker([lat, lng], {icon: blueDot, zIndexOffset: -1}).addTo(map);
          // First time — center map and move green pin to customer
          map.setView([lat, lng], 18);
          marker.setLatLng([lat, lng]);
          setReady(lat, lng);
          document.getElementById('spinner').classList.add('hide');
        }
      },
      function() {
        setReady(DEFAULT_LAT, DEFAULT_LNG);
        document.getElementById('spinner').classList.add('hide');
        document.getElementById('status-text').textContent = 'I-tap ang mapa para ituro ang bahay ninyo.';
      },
      {enableHighAccuracy: true, timeout: 15000, maximumAge: 0}
    );
  }

  startWatching();

  function confirmLocation() {
    var btn = document.getElementById('confirm-btn');
    if (!btn.classList.contains('ready')) return;
    var pos = marker.getLatLng();
    var lat = pos.lat.toFixed(6);
    var lng = pos.lng.toFixed(6);
    btn.textContent = 'Nagse-save...';
    btn.style.background = '#aaa';

    if (!SAVE_URL) {
      setTimeout(function() {
        document.getElementById('done').classList.add('show');
      }, 500);
      return;
    }

    var url = SAVE_URL
      + '?action=save'
      + '&lat='     + lat
      + '&lng='     + lng
      + '&name='    + encodeURIComponent(NAME)
      + '&contact=' + encodeURIComponent(CONTACT)
      + '&order='   + encodeURIComponent(ORDER)
      + '&ref='     + encodeURIComponent(REF);

    var saveImg = new Image();
saveImg.src = url;
setTimeout(function() {
  document.getElementById('done').classList.add('show');
}, 800);
  }
</script>
</body>
</html>
